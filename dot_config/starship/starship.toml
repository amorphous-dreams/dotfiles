# ~/.config/starship/starship.toml — managed by chezmoi
# Same on all machines — context differences handled in shell rc files

scan_timeout = 10

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
truncate_to_repo   = true
truncation_length  = 2
truncation_symbol  = "…/"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
truncation_length  = 24
truncation_symbol  = "…"

[git_status]
modified   = "!"
staged     = "+"
untracked  = "?"
renamed    = "»"
deleted    = "✘"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"

# ── Languages ─────────────────────────────────────────────────────────────────
[nodejs]
format = "via [ $version]($style) "

[python]
format = "via [🐍 $version]($style)($virtualenv) "

# ── Command duration ─────────────────────────────────────────────────────────
[cmd_duration]
min_time           = 2000
format             = "[$duration]($style) "
style              = "yellow"

# ── Time (off by default — uncomment to enable) ───────────────────────────────
# [time]
# disabled    = false
# format      = "[$time]($style) "
# time_format = "%H:%M"
